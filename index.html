<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Disk Space Analyzer</title>
  <link rel="stylesheet" href="style.css">
  <!-- Include Outfit Font from Google Fonts for premium typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="glass-bg"></div>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="brand">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" width="24" height="24">
            <path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.53c-.26-.81-1-1.4-1.9-1.4h-1v-3c0-.55-.45-1-1-1h-6v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.4z"/>
          </svg>
        </div>
        <h1>Disk Space Analyzer</h1>
      </div>
      <div class="scan-meta" id="scan-meta">
        <span>No scan loaded</span>
      </div>
      <div class="header-actions">
        <select id="drive-select" class="btn btn-secondary">
          <option value="" disabled>Select Scan</option>
          <option value="scan_results.json" selected>Home User (C:\Users\admin)</option>
          <option value="C_drive_results.json">Drive C:\</option>
          <option value="D_drive_results.json">Drive D:\</option>
          <option value="E_drive_results.json">Drive E:\</option>
          <option value="F_drive_results.json">Drive F:\</option>
        </select>
        <label for="json-upload" class="btn btn-secondary">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
            <path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z"/>
          </svg>
          Load Custom JSON
        </label>
        <input type="file" id="json-upload" accept=".json" style="display: none;">
      </div>
    </header>

    <!-- Dashboard Content -->
    <main class="dashboard">
      <!-- Stats Cards -->
      <section class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon size-icon">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM19 18H6c-2.21 0-4-1.79-4-4 0-2.05 1.53-3.76 3.56-3.97l1.07-.11.5-.95C8.08 7.14 9.94 6 12 6c2.62 0 4.88 1.86 5.39 4.43l.3 1.5 1.53.11c1.56.1 2.78 1.41 2.78 2.96 0 1.65-1.35 3-3 3z"/></svg>
          </div>
          <div class="stat-info">
            <h3>Total Scanned Size</h3>
            <p id="stat-total-size">-</p>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-icon folder-icon">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
          </div>
          <div class="stat-info">
            <h3>Total Folders</h3>
            <p id="stat-total-folders">-</p>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-icon file-icon">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
          </div>
          <div class="stat-info">
            <h3>Total Files</h3>
            <p id="stat-total-files">-</p>
          </div>
        </div>
      </section>

      <!-- Main Columns -->
      <div class="dashboard-grid">
        <!-- Left: Interactive Folder Explorer -->
        <section class="panel explorer-panel">
          <div class="panel-header">
            <div class="explorer-navigation">
              <button id="btn-back" class="btn btn-icon" title="Go up one folder">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
              </button>
              <div class="breadcrumbs" id="breadcrumbs">
                <!-- Breadcrumbs generated here -->
              </div>
            </div>
            <div class="search-box">
              <input type="text" id="search-input" placeholder="Search files & folders in current path...">
              <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            </div>
          </div>
          <div class="panel-body table-responsive">
            <table class="explorer-table">
              <thead>
                <tr>
                  <th class="col-name" id="sort-name">Name <span class="sort-indicator"></span></th>
                  <th class="col-size" id="sort-size">Size <span class="sort-indicator">desc</span></th>
                  <th class="col-bar">Percentage of Parent</th>
                  <th class="col-actions">Actions</th>
                </tr>
              </thead>
              <tbody id="explorer-tbody">
                <!-- Directory listing loaded here -->
              </tbody>
            </table>
          </div>
        </section>

        <!-- Right: Charts and Large Files List -->
        <div class="sidebar-panels">
          <!-- Extension chart panel -->
          <section class="panel chart-panel">
            <div class="panel-header">
              <h2>File Type Breakdown</h2>
            </div>
            <div class="panel-body chart-container">
              <div class="donut-chart-wrapper">
                <svg id="extension-chart" viewBox="0 0 200 200" width="100%" height="100%">
                  <!-- SVG segments generated here -->
                  <circle cx="100" cy="100" r="60" fill="transparent" stroke="var(--bg-card)" stroke-width="25"></circle>
                </svg>
                <div class="donut-center">
                  <div class="donut-center-title">Extensions</div>
                </div>
              </div>
              <div class="chart-legend" id="chart-legend">
                <!-- Legend items generated here -->
              </div>
            </div>
          </section>

          <!-- Top Large Files panel -->
          <section class="panel large-files-panel">
            <div class="panel-header">
              <h2>Top 50 Largest Files</h2>
            </div>
            <div class="panel-body scroll-list">
              <ul class="large-files-list" id="large-files-list">
                <!-- Large files generated here -->
              </ul>
            </div>
          </section>
        </div>
      </div>
    </main>
  </div>

  <!-- Toast notification for copy paths -->
  <div class="toast" id="toast">Path copied to clipboard!</div>
</body>
</html>
